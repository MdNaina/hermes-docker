x-hermes-common: &hermes-common
    build:
      context: .
      args:
        INSTALL_OPTIONAL_BUILD_TOOLS: ${INSTALL_OPTIONAL_BUILD_TOOLS:-false}
        OBSIDIAN_VERSION: ${OBSIDIAN_VERSION:-1.12.7}
        PREBUILD_HERMES_UI: ${PREBUILD_HERMES_UI:-false}
        FASTER_WHISPER_VERSION: ${FASTER_WHISPER_VERSION:-1.2.1}
    image: hermes-docker
    container_name: ${HERMES_CONTAINER_NAME:-hermes-docker}
    # Chromium/Brave needs a larger /dev/shm and, in this Selkies desktop
    # image, an unconfined seccomp profile paired with Brave --no-sandbox.
    # Do not run privileged or with host networking.
    privileged: false
    shm_size: "2gb"
    security_opt:
      - seccomp:unconfined
    environment:
      # ---- Selkies web desktop ----
      - CUSTOM_USER=${CUSTOM_USER:?run ./setup-hermes-env first}
      - PASSWORD=${PASSWORD:?run ./setup-hermes-env first}
      - TITLE=${TITLE:-Hermes Desktop}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      # ---- X11 / Wayland switch ----
      # false = X11 (default, widest compatibility, CPU encode)
      # true  = Wayland (Smithay + Labwc, zero-copy GPU encode; needs AVX2/GPU,
      #         auto-falls-back to X11 on CPUs without AVX2)
      - PIXELFLUX_WAYLAND=${PIXELFLUX_WAYLAND:-false}
      # Uncomment to auto-use the first GPU for Wayland encode/render:
      # - AUTO_GPU=true
      # ---- Hermes web dashboard (starts after gateway on :8642) ----
      - HERMES_DASHBOARD=${HERMES_DASHBOARD:-1}
      - HERMES_DASHBOARD_HOST=${HERMES_DASHBOARD_HOST:-0.0.0.0}
      - HERMES_DASHBOARD_PORT=${HERMES_DASHBOARD_PORT:-9119}
      - BU_CDP_URL=${BU_CDP_URL:-http://127.0.0.1:9222}
      - BROWSER_HARNESS_HOME=${BROWSER_HARNESS_HOME:-/config/.browser-harness}
      - BH_HOME=${BH_HOME:-/config/.browser-harness}
      - BH_DOMAIN_SKILLS=${BH_DOMAIN_SKILLS:-0}
      - FASTER_WHISPER_HOME=${FASTER_WHISPER_HOME:-/config/.cache/faster-whisper}
      - HF_HOME=${HF_HOME:-/config/.cache/huggingface}
      - OBSIDIAN_AUTOSTART=${OBSIDIAN_AUTOSTART:-0}
      # Required for 0.0.0.0 bind (non-loopback). Change these — do not use defaults on the public internet.
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:?run ./setup-hermes-env first}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:?run ./setup-hermes-env first}
    volumes:
      - ${HERMES_CONFIG_VOLUME:-./data}:/config
    restart: unless-stopped
    networks:
      - hermes-private
    healthcheck:
      test: ["CMD", "hermes-smoke-check", "gateway"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    # ---- Optional GPU acceleration for Wayland mode ----
    # Intel / AMD: expose the render node
    # devices:
    #   - /dev/dri:/dev/dri
    # NVIDIA: requires the nvidia container runtime on the host
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [compute, video, graphics, utility]

services:
  hermes-local:
    <<: *hermes-common
    profiles: ["local"]
    ports:
      - "${HERMES_BIND_ADDRESS:-127.0.0.1}:${HERMES_DESKTOP_HTTPS_HOST_PORT:-3001}:3001"   # Selkies desktop (HTTPS)
      - "${HERMES_BIND_ADDRESS:-127.0.0.1}:${HERMES_DESKTOP_HTTP_HOST_PORT:-3000}:3000"     # Selkies desktop (HTTP, optional)
      - "${HERMES_BIND_ADDRESS:-127.0.0.1}:${HERMES_GATEWAY_HOST_PORT:-8642}:8642"          # Hermes gateway API / messaging (/health)
      - "${HERMES_BIND_ADDRESS:-127.0.0.1}:${HERMES_DASHBOARD_HOST_PORT:-9119}:9119"        # Hermes web dashboard (when HERMES_DASHBOARD=1)

  hermes-server:
    <<: *hermes-common
    profiles: ["server"]
    expose:
      - "3001" # Selkies desktop HTTPS for reverse proxy/VPN only
      - "8642" # Hermes gateway API / messaging
      - "9119" # Hermes dashboard

networks:
  hermes-private:
    driver: bridge
